version = 1

# Xcode project internals present since the project's original 2025 scaffold,
# continuously modified rather than replaced (verified via git history).
# Never hand-edit; annotate here instead, since Xcode rewrites these on
# nearly every build or project-settings change.
[[annotations]]
path = [
    "Cirruscope.xcodeproj/project.pbxproj",
    "Cirruscope.xcodeproj/project.xcworkspace/contents.xcworkspacedata",
]
precedence = "override"
SPDX-FileCopyrightText = "2025 Iva Horn"
SPDX-License-Identifier = "MIT"

# SwiftPM's resolved-dependency lockfile: deleted and regenerated fresh in
# 2026 when the app was rewritten, so its current content dates from then.
[[annotations]]
path = "Cirruscope.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved"
precedence = "override"
SPDX-FileCopyrightText = "2026 Iva Horn"
SPDX-License-Identifier = "MIT"

# Asset catalog root manifest: present since 2025, continuously carried
# through the Framecloud-to-Cirruscope rename without being replaced.
[[annotations]]
path = "Cirruscope/Assets.xcassets/Contents.json"
precedence = "override"
SPDX-FileCopyrightText = "2025 Iva Horn"
SPDX-License-Identifier = "MIT"

# Asset catalog contents added in 2026: binary images plus their
# Contents.json manifests, both owned by Xcode's Asset Catalog editor.
[[annotations]]
path = [
    "Cirruscope/Assets.xcassets/Background.imageset/Background.jpg",
    "Cirruscope/Assets.xcassets/Background.imageset/Contents.json",
    "Cirruscope/Assets.xcassets/Logo.imageset/Contents.json",
    "Cirruscope/Assets.xcassets/Logo.imageset/Dark.png",
    "Cirruscope/Assets.xcassets/Logo.imageset/Light.png",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Iva Horn"
SPDX-License-Identifier = "MIT"

# App icon (Xcode 26 Icon Composer .icon bundle): icon.json is pure JSON,
# and editing the icon visually in Icon Composer can regenerate the whole
# bundle with no guarantee an inline comment survives, so every layer is
# annotated here rather than inline. icon.json and Cloud.svg have been
# present since 2025, carried through the rename without being replaced;
# the remaining layers were added later, in 2026. Excludes the Nextcloud
# mark layer, annotated separately below.
[[annotations]]
path = [
    "Cirruscope/AppIcon.icon/icon.json",
    "Cirruscope/AppIcon.icon/Assets/Cloud.svg",
]
precedence = "override"
SPDX-FileCopyrightText = "2025 Iva Horn"
SPDX-License-Identifier = "MIT"

[[annotations]]
path = [
    "Cirruscope/AppIcon.icon/Assets/Zoom.svg",
    "Cirruscope/AppIcon.icon/Assets/layer-0-background.svg",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Iva Horn"
SPDX-License-Identifier = "MIT"

# App icon — Nextcloud mark layer: Nextcloud's own trademark/logo, not
# relicensed as this project's own MIT-licensed work.
[[annotations]]
path = "Cirruscope/AppIcon.icon/Assets/White Nextcloud Mark.svg"
precedence = "override"
SPDX-FileCopyrightText = "Nextcloud GmbH"
SPDX-License-Identifier = "LicenseRef-Nextcloud-Trademark"

# Miscellaneous Xcode-GUI-editable or generated files, all added in 2026:
# Interface Builder storyboard, the Privacy Manifest editor's file, the
# Info tab's file, the two String Catalogs (JSON, one for Swift strings, one
# for storyboard strings since migrating off per-locale Main.strings files),
# the bare version file SwiftFormat itself parses, and the root LICENSE text.
[[annotations]]
path = [
    ".swift-version",
    "LICENSE",
    "Cirruscope/Base.lproj/Main.storyboard",
    "Cirruscope/Info.plist",
    "Cirruscope/PrivacyInfo.xcprivacy",
    "Cirruscope/Localizable.xcstrings",
    "Cirruscope/mul.lproj/Main.xcstrings",
]
precedence = "override"
SPDX-FileCopyrightText = "2026 Iva Horn"
SPDX-License-Identifier = "MIT"

# Website: everything under it is this project's own work by default. A
# blanket wildcard rather than an explicit file list for now. REUSE.toml
# resolves overlapping annotations by file order (last match wins, not most
# specific), so the third-party font carve-out below must come after this.
[[annotations]]
path = "Website/**"
precedence = "override"
SPDX-FileCopyrightText = "2026 Iva Horn"
SPDX-License-Identifier = "MIT"

# Website: third-party web fonts bundled with the marketing site are the
# exception — not this project's own copyrighted work. Inter is licensed
# under the SIL Open Font License, Material Symbols under the Apache
# License, and fonts.css assembles @font-face rules for both.
[[annotations]]
path = [
    "Website/assets/fonts/f05.woff2",
    "Website/assets/fonts/f06.woff2",
]
precedence = "override"
SPDX-FileCopyrightText = "The Inter Project Authors"
SPDX-License-Identifier = "OFL-1.1"

[[annotations]]
path = "Website/assets/fonts/f07.woff2"
precedence = "override"
SPDX-FileCopyrightText = "Google LLC"
SPDX-License-Identifier = "Apache-2.0"

[[annotations]]
path = "Website/assets/fonts/fonts.css"
precedence = "override"
SPDX-FileCopyrightText = ["The Inter Project Authors", "Google LLC"]
SPDX-License-Identifier = "OFL-1.1 AND Apache-2.0"
