name: Build

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Resolve Dependencies
        run: xcodebuild -resolvePackageDependencies -project Cirruscope.xcodeproj

      - name: Build
        run: xcodebuild -project Cirruscope.xcodeproj -scheme Cirruscope -configuration Release -destination 'platform=macOS' build